name: Create Release Tag

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-tag-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  create-release-tag:
    if: >
      github.repository == 'awaae001/st_cardplus' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest

    steps:
    - name: Create next patch tag
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const semverPattern = /^\d+\.\d+\.\d+$/;

          const compareVersions = (left, right) => {
            const leftParts = left.split('.').map((part) => Number.parseInt(part, 10));
            const rightParts = right.split('.').map((part) => Number.parseInt(part, 10));
            const maxLength = Math.max(leftParts.length, rightParts.length);

            for (let index = 0; index < maxLength; index += 1) {
              const leftPart = leftParts[index] ?? 0;
              const rightPart = rightParts[index] ?? 0;

              if (leftPart > rightPart) return 1;
              if (leftPart < rightPart) return -1;
            }

            return 0;
          };

          const incrementPatch = (version) => {
            const parts = version.split('.').map((part) => Number.parseInt(part, 10));
            return `${parts[0]}.${parts[1]}.${parts[2] + 1}`;
          };

          const tags = await github.paginate(github.rest.repos.listTags, {
            owner,
            repo,
            per_page: 100,
          });

          const latestVersion = tags
            .map((tag) => tag.name)
            .filter((tagName) => semverPattern.test(tagName))
            .sort(compareVersions)
            .at(-1) ?? '0.0.0';

          const nextVersion = incrementPatch(latestVersion);
          const targetSha = context.payload.pull_request.merge_commit_sha || context.payload.pull_request.head.sha;

          await github.rest.git.createRef({
            owner,
            repo,
            ref: `refs/tags/${nextVersion}`,
            sha: targetSha,
          });

          core.summary
            .addHeading('Release Tag Created')
            .addRaw(`PR #${context.payload.pull_request.number} -> ${nextVersion}`)
            .write();
