name: Build and Deploy

on:
  push:
    branches: [ main, dev ]
    tags:
      - '**'
  pull_request:
    types: [ closed ]

permissions:
  contents: read
  actions: write
  pull-requests: read

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    if: github.repository == 'jiuci18/st_cardplus' && (
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'closed' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        contains(join(github.event.pull_request.labels.*.name, ','), 'release')
      )
      )
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run type check
      run: pnpm type-check

  build-web:
    needs: type-check
    if: github.repository == 'jiuci18/st_cardplus' && (
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'closed' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        contains(join(github.event.pull_request.labels.*.name, ','), 'release')
      )
      )
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build web version
      env:
        APP_CHANNEL_OVERRIDE: ${{ (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && contains(join(github.event.pull_request.labels.*.name, ','), 'release')) || (startsWith(github.ref, 'refs/tags/') && github.ref_name != '' && !contains(github.ref_name, '/')) && 'stable' || '' }}
      run: pnpm build

    - name: Upload web build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: dist/

  build-windows:
    needs: type-check
    if: github.repository == 'jiuci18/st_cardplus' && (
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'closed' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        contains(join(github.event.pull_request.labels.*.name, ','), 'release')
      )
      )
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri -> target

    - name: Build Windows installers
      env:
        APP_CHANNEL_OVERRIDE: ${{ (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && contains(join(github.event.pull_request.labels.*.name, ','), 'release')) || (startsWith(github.ref, 'refs/tags/') && github.ref_name != '' && !contains(github.ref_name, '/')) && 'stable' || '' }}
      run: pnpm build:desktop

    - name: Upload Windows NSIS installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-nsis-installer
        path: src-tauri/target/release/bundle/nsis/*.exe
        if-no-files-found: error

    - name: Upload Windows MSI installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-msi-installer
        path: src-tauri/target/release/bundle/msi/*.msi
        if-no-files-found: error

  build-linux-deb:
    needs: type-check
    if: github.repository == 'jiuci18/st_cardplus' && (
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'closed' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        contains(join(github.event.pull_request.labels.*.name, ','), 'release')
      )
      )
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri -> target

    - name: Generate Tauri icons
      run: pnpm prepare:icons

    - name: Build Linux Debian package
      env:
        APP_CHANNEL_OVERRIDE: ${{ (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && contains(join(github.event.pull_request.labels.*.name, ','), 'release')) || (startsWith(github.ref, 'refs/tags/') && github.ref_name != '' && !contains(github.ref_name, '/')) && 'stable' || '' }}
      run: pnpm tauri build --bundles deb

    - name: Upload Linux Debian package artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-deb
        path: src-tauri/target/release/bundle/deb/*.deb
        if-no-files-found: error

  prepare-release:
    needs:
      - build-web
      - build-windows
      - build-linux-deb
    if: github.repository == 'jiuci18/st_cardplus' && (
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && contains(join(github.event.pull_request.labels.*.name, ','), 'release')) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      tag_name: ${{ steps.release_info.outputs.tag_name }}
      release_name: ${{ steps.release_info.outputs.release_name }}
      release_body: ${{ steps.release_info.outputs.release_body }}
      target_sha: ${{ steps.release_info.outputs.target_sha }}

    steps:
    - name: Prepare release metadata
      id: release_info
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const semverPattern = /^\d+\.\d+\.\d+$/;
          const currentSha = context.eventName === 'pull_request'
            ? context.payload.pull_request?.merge_commit_sha || context.sha
            : context.sha;

          const compareVersions = (left, right) => {
            const leftParts = left.split('.').map((part) => Number.parseInt(part, 10));
            const rightParts = right.split('.').map((part) => Number.parseInt(part, 10));
            const maxLength = Math.max(leftParts.length, rightParts.length);

            for (let index = 0; index < maxLength; index += 1) {
              const leftPart = leftParts[index] ?? 0;
              const rightPart = rightParts[index] ?? 0;

              if (leftPart > rightPart) return 1;
              if (leftPart < rightPart) return -1;
            }

            return 0;
          };

          const incrementPatch = (version) => {
            const parts = version.split('.').map((part) => Number.parseInt(part, 10));
            return `${parts[0]}.${parts[1]}.${parts[2] + 1}`;
          };

          const loadAssociatedPullRequest = async (sha) => {
            const pullRequests = await github.paginate(
              github.rest.repos.listPullRequestsAssociatedWithCommit,
              {
                owner,
                repo,
                commit_sha: sha,
                per_page: 100,
              }
            );

            return pullRequests.find((pullRequest) => pullRequest.merged_at) ?? pullRequests[0] ?? null;
          };

          const findOrCreateTagForCommit = async (sha) => {
            const tags = await github.paginate(github.rest.repos.listTags, {
              owner,
              repo,
              per_page: 100,
            });

            const existingTag = tags
              .filter((tag) => semverPattern.test(tag.name) && tag.commit?.sha === sha)
              .map((tag) => tag.name)
              .sort(compareVersions)
              .at(-1);

            if (existingTag) {
              return existingTag;
            }

            const latestVersion = tags
              .map((tag) => tag.name)
              .filter((tagName) => semverPattern.test(tagName))
              .sort(compareVersions)
              .at(-1) ?? '0.0.0';

            const nextVersion = incrementPatch(latestVersion);
            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${nextVersion}`,
              sha,
            });

            return nextVersion;
          };

          const buildReleaseNotes = (tagName, pullRequest) => {
            if (!pullRequest) {
              return {
                releaseName: tagName,
                releaseBody: [
                  `## ${tagName}`,
                  '',
                  `未找到与提交 ${currentSha} 关联的 PR，已回退为基础版本说明。`,
                ].join('\n'),
              };
            }

            const title = (pullRequest.title || '').trim();
            const body = (pullRequest.body || '').trim();

            return {
              releaseName: title ? `${tagName} - ${title}` : tagName,
              releaseBody: [
                title ? `## ${title}` : `## ${tagName}`,
                '',
                body || '_PR 描述为空_',
                '',
                `关联 PR: #${pullRequest.number}`,
              ].join('\n'),
            };
          };

          let tagName = '';
          let associatedPullRequest = null;

          if (context.eventName === 'pull_request') {
            associatedPullRequest = context.payload.pull_request ?? null;
            if (!associatedPullRequest?.merged) {
              core.setFailed('Release pull request payload is unavailable or not merged.');
              return;
            }
            tagName = await findOrCreateTagForCommit(currentSha);
          } else {
            tagName = context.ref.replace('refs/tags/', '');
            if (!semverPattern.test(tagName)) {
              core.setFailed(`Tag ${tagName} is not a valid release tag.`);
              return;
            }
            associatedPullRequest = await loadAssociatedPullRequest(currentSha);
          }

          const releaseNotes = buildReleaseNotes(tagName, associatedPullRequest);
          core.setOutput('tag_name', tagName);
          core.setOutput('release_name', releaseNotes.releaseName);
          core.setOutput('release_body', releaseNotes.releaseBody);
          core.setOutput('target_sha', currentSha);

  release:
    needs: prepare-release
    if: github.repository == 'jiuci18/st_cardplus'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pull-requests: read
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets

    - name: Package web build
      run: |
        cd release-assets/web-build
        zip -r "../sillytavern-char_cardplus-${{ needs.prepare-release.outputs.tag_name }}-web.zip" .

    - name: Publish GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare-release.outputs.tag_name }}
        target_commitish: ${{ needs.prepare-release.outputs.target_sha }}
        name: ${{ needs.prepare-release.outputs.release_name }}
        body: ${{ needs.prepare-release.outputs.release_body }}
        files: |
          release-assets/sillytavern-char_cardplus-${{ needs.prepare-release.outputs.tag_name }}-web.zip
          release-assets/windows-nsis-installer/*.exe
          release-assets/windows-msi-installer/*.msi
          release-assets/linux-deb/*.deb
