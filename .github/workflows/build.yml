name: Build and Deploy

on:
  push:
    branches: [ main, dev ]
    tags:
      - '**'

permissions:
  contents: read
  actions: write
  pull-requests: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    if: github.repository == 'awaae001/st_cardplus'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run type check
      run: pnpm type-check

  build-web:
    needs: type-check
    if: github.repository == 'awaae001/st_cardplus'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Sync app version to release tag
      if: startsWith(github.ref, 'refs/tags/')
      run: node scripts/set-version.mjs "${{ github.ref_name }}"

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build web version
      env:
        APP_CHANNEL_OVERRIDE: ${{ startsWith(github.ref, 'refs/tags/') && 'stable' || '' }}
      run: pnpm build

    - name: Upload web build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: dist/

  build-windows:
    needs: type-check
    if: github.repository == 'awaae001/st_cardplus'
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Sync app version to release tag
      if: startsWith(github.ref, 'refs/tags/')
      run: node scripts/set-version.mjs "${{ github.ref_name }}"

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri -> target

    - name: Build Windows installers
      env:
        APP_CHANNEL_OVERRIDE: ${{ startsWith(github.ref, 'refs/tags/') && 'stable' || '' }}
      run: pnpm build:desktop

    - name: Upload Windows NSIS installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-nsis-installer
        path: src-tauri/target/release/bundle/nsis/*.exe
        if-no-files-found: error

    - name: Upload Windows MSI installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-msi-installer
        path: src-tauri/target/release/bundle/msi/*.msi
        if-no-files-found: error

  build-linux-appimage:
    needs: type-check
    if: github.repository == 'awaae001/st_cardplus'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Sync app version to release tag
      if: startsWith(github.ref, 'refs/tags/')
      run: node scripts/set-version.mjs "${{ github.ref_name }}"

    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri -> target

    - name: Generate Tauri icons
      run: pnpm prepare:icons

    - name: Build Linux AppImage
      env:
        APP_CHANNEL_OVERRIDE: ${{ startsWith(github.ref, 'refs/tags/') && 'stable' || '' }}
      run: pnpm tauri build --bundles appimage

    - name: Upload Linux AppImage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-appimage
        path: src-tauri/target/release/bundle/appimage/*.AppImage
        if-no-files-found: error

  release:
    needs:
      - build-web
      - build-windows
      - build-linux-appimage
    if: github.repository == 'awaae001/st_cardplus' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pull-requests: read

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets

    - name: Package web build
      run: |
        cd release-assets/web-build
        zip -r "../sillytavern-char_cardplus-${{ github.ref_name }}-web.zip" .

    - name: Prepare release notes from PR
      id: release_notes
      uses: actions/github-script@v7
      env:
        TAG_NAME: ${{ github.ref_name }}
      with:
        script: |
          const fs = require('fs');
          const { owner, repo } = context.repo;
          const pullRequests = await github.paginate(
            github.rest.repos.listPullRequestsAssociatedWithCommit,
            {
              owner,
              repo,
              commit_sha: context.sha,
              per_page: 100,
            }
          );

          const mergedPullRequest = pullRequests.find((pr) => pr.merged_at) ?? pullRequests[0] ?? null;
          const tagName = process.env.TAG_NAME;
          let releaseBody;
          let releaseName = tagName;

          if (mergedPullRequest) {
            const prBody = (mergedPullRequest.body || '').trim();
            releaseName = `${tagName} - ${mergedPullRequest.title}`;
            releaseBody = [
              `## ${mergedPullRequest.title}`,
              '',
              prBody || '_PR 描述为空_',
              '',
              `关联 PR: #${mergedPullRequest.number}`,
            ].join('\n');
          } else {
            releaseBody = [
              `## ${tagName}`,
              '',
              `未找到与提交 ${context.sha} 关联的 PR，已回退为基础版本说明。`,
            ].join('\n');
          }

          fs.writeFileSync('release-notes.md', releaseBody);
          core.setOutput('release_name', releaseName);

    - name: Publish GitHub release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ steps.release_notes.outputs.release_name }}
        body_path: release-notes.md
        files: |
          release-assets/sillytavern-char_cardplus-${{ github.ref_name }}-web.zip
          release-assets/windows-nsis-installer/*.exe
          release-assets/windows-msi-installer/*.msi
          release-assets/linux-appimage/*.AppImage
