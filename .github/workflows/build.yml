name: Build and Deploy

on:
  push:
    branches: [ main, dev ]

permissions:
  contents: read
  actions: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    if: github.repository == 'awaae001/st_cardplus'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run type check
      run: pnpm type-check

  build-web:
    needs: type-check
    if: github.repository == 'awaae001/st_cardplus'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build web version
      run: pnpm build

    - name: Upload web build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: dist/

  build-windows:
    needs: type-check
    if: github.repository == 'awaae001/st_cardplus'
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri -> target

    - name: Build Windows installers
      run: pnpm build:desktop

    - name: Upload Windows NSIS installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-nsis-installer
        path: src-tauri/target/release/bundle/nsis/*.exe
        if-no-files-found: error

    - name: Upload Windows MSI installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-msi-installer
        path: src-tauri/target/release/bundle/msi/*.msi
        if-no-files-found: error

  build-linux-appimage:
    needs: type-check
    if: github.repository == 'awaae001/st_cardplus'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri -> target

    - name: Generate Tauri icons
      run: pnpm prepare:icons

    - name: Build Linux AppImage
      run: pnpm tauri build --bundles appimage

    - name: Upload Linux AppImage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-appimage
        path: src-tauri/target/release/bundle/appimage/*.AppImage
        if-no-files-found: error
